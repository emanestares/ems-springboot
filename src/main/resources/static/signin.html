<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — EMS Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="signin.css"/>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>
<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
</div>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="#2563eb"/>
                    <path d="M8 22c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="16" cy="12" r="4" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <span class="brand-name">EMS Portal</span>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your admin account</p>

        <div id="alert-box" class="alert hidden"></div>

        <form id="signin-form" novalidate>
            <div class="field-group">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M2.5 5.5l7.5 5 7.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <rect x="2.5" y="4.5" width="15" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <input type="email" id="email" name="email" placeholder="admin@company.com" autocomplete="email" required/>
                </div>
                <span class="field-error" id="email-err"></span>
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                        <rect x="4" y="9" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M7 9V7a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
                    <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
                        <svg viewBox="0 0 20 20" fill="none">
                            <path d="M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                </div>
                <span class="field-error" id="password-err"></span>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                <span class="btn-text">Sign In</span>
                <span class="btn-spinner hidden"></span>
            </button>
        </form>

        <!--<p class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></p>-->
    </div>
</div>

<script src="signin.js"></script>
</body>
</html>
